mybatis-flex.datasource:
  default:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/video-server?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123

mybatis-flex:
  defaultDatasourceKey: default
  typeAliasesPackage: # 必须要数组格式。。
    - "com.afo.video.domain"
  mapperLocations:
    - "com.afo.video.mapper"
  configuration:
    cacheEnabled: false
    mapUnderscoreToCamelCase: true
  global-config:
    printBanner: false
    key-config:
      keyType: "Generator"
      value: "snowFlakeId"

