#server.port: 8080

solon.app:
  name: 'VideoServer'
  group: 'VideoServer'

# 以下为solon默认值
solon.logging.appender:
  console:
    level: TRACE
    enable: true #是否启用
  file:
    name: "logs/${solon.app.name}"
    level: INFO
    enable: true #是否启用
    extension: ".log"   #(.log, .log.gz, .log.zip）
    maxFileSize: "10 MB"
    maxHistory: "7"

# 记录器级别的配置
solon.logging.logger:
  "root": #默认记录器配置
    level: WARN # 默认：TRACE
  "com.afo.video.common.exception":
    level: INFO
  "com.zaxxer.hikari":
    level: WARN  # 默认：WARN
  "com.afo.video.mapper":
    level: DEBUG # 输出SQL语句
  "com.mybatisflex.core":
    level: INFO
  "sa-token":
    level: INFO

#设定最大的请求包大小（或表单项的值大小）//默认: 2m
server.request.maxBodySize: 10mb #kb,mb
#设定最大的上传文件大小
server.request.maxFileSize: 10mb #kb,mb (默认使用 maxBodySize 配置值)
#设定最大的请求头大小//默认: 8k
server.request.maxHeaderSize: 8kb #kb,mb
#设定上传使用临时文件（v2.7.2 后支持。v3.6.0 后失效，由 fileSizeThreshold 替代）
server.request.useTempfile: false #默认 false
#设定上传文件大小阀值（v3.6.0 后支持）
server.request.fileSizeThreshold: 10mb #默认 512kb
# 自定义的静态资源配置不生效，使用不需要配置的默认配置,将所想相关目录代码修改为resources/static
